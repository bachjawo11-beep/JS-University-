<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | JS University</title>

<link rel="stylesheet" href="css/style.css">

<style>
.admin-container{
    padding:30px 8%;
}

.table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

.table th, .table td{
    border:1px solid #333;
    padding:10px;
    text-align:left;
}

.table th{
    background:gold;
    color:black;
}

.btn-small{
    padding:6px 10px;
    font-size:12px;
    margin:2px;
}
</style>

</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-crown"></i>
            <span>JSU Admin</span>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Website</a></li>
            <li><a href="portal.html">Portal</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Admin Dashboard</h1>
        <p>Manage admissions and students</p>
    </div>
</section>

<section class="admin-container">

<h2 style="color:gold;">📥 Applications</h2>

<table class="table" id="applicationsTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Program</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>


</section>

<script src="js/admin.js"></script>

</body>
  </html>
